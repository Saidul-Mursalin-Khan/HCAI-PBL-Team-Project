{% extends 'project1/base.html' %}
{% block content %}
<h2>Configure Training</h2>

<form method="post">
  {% csrf_token %}

  <label>Target Column:</label>
  <select name="target_column">
    {% for col in columns %}
      <option value="{{ col }}" {% if col == target_column %}selected{% endif %}>{{ col }}</option>
    {% endfor %}
  </select>

  <label>Problem Type (auto-detected: {{ auto_detected_type }}):</label>
  <select name="problem_type">
    <option value="">Auto-detect</option>
    <option value="classification">Classification</option>
    <option value="regression">Regression</option>
  </select>

  <label>Test Size: <span id="split-val">20%</span></label>
  <input type="range" name="test_size" min="0.1" max="0.4" step="0.05" value="0.2"
         oninput="document.getElementById('split-val').textContent = Math.round(this.value * 100) + '%'">

  <button type="submit">Train Model</button>
</form>
{% endblock %}
