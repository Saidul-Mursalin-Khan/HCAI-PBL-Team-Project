 <!DOCTYPE html>

<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title></title>
    <meta name="description" content="">

{% if error %}
  <p class="error">{{ error }}</p>
{% endif %}

{% if table_html %}
<div class= "centered-content">
  <h3>Preview (first 20 rows) — {{ shape.0 }} rows × {{ shape.1 }} columns</h3>
  {{ table_html|safe }}
</div>
  <h3>Set Target Label</h3>
  <form method="post" action="{% url 'project1:configure' %}">
    {% csrf_token %}
    <label >Select target column:</label>
    <select name="target_column">
      {% for col in columns %}
        <option value="{{ col }}">{{ col }}</option>
      {% endfor %}
    </select>
    <button type="submit">Next: Configure</button>
  </form>
{% endif %}

    
    <script src="" async defer></script>
  </body>
</html>
